<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Karla:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg: #0e0d0b;
  --bg2: #161512;
  --bg3: #1e1c18;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ece2;
  --text2: #a09880;
  --text3: #5a5448;
  --red: #d4442a;
  --red2: #ff6b4a;
  --gold: #c9a84c;
  --gold2: #f0c96a;
  --teal: #2a9d7a;
  --teal2: #3dbf96;
  --sakura: #e8a0b0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Karla', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: rgba(14,13,11,0.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); display: flex; align-items: center;
  padding: 0 24px; z-index: 1000; gap: 16px;
}
.htitle {
  font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900;
  font-style: italic; color: var(--text); flex-shrink: 0;
}
.htitle span { color: var(--red2); }
.hdates { font-size: 11px; color: var(--text3); font-weight: 300; letter-spacing: 0.12em; text-transform: uppercase; }
.hspace { flex: 1; }
.hstats { display: flex; gap: 20px; align-items: center; }
.hstat { text-align: center; }
.hstat-n { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1; color: var(--gold); }
.hstat-l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
.hdiv { width: 1px; height: 28px; background: var(--border2); }

.btn { font-family: 'Karla', sans-serif; font-size: 12px; font-weight: 500; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; transition: all 0.18s; }
.btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
.btn-outline:hover { background: var(--bg3); color: var(--text); }
.btn-red { background: var(--red); color: white; }
.btn-red:hover { background: var(--red2); }

.layout { display: flex; height: 100vh; padding-top: 52px; }

.panel { width: 360px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; overflow: hidden; z-index: 2; }

.ptabs { display: flex; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ptab { font-family: 'Karla', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 12px 10px; border-bottom: 2px solid transparent; cursor: pointer; background: none; border-top: none; border-left: none; border-right: none; transition: color 0.15s; white-space: nowrap; }
.ptab.on { color: var(--gold); border-bottom-color: var(--gold); }
.ptab:hover { color: var(--text); }

.pscroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
.pscroll::-webkit-scrollbar { width: 3px; }
.pscroll::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

.day-block { border-bottom: 1px solid var(--border); }
.day-hd { display: flex; align-items: center; padding: 11px 20px 11px 16px; cursor: pointer; transition: background 0.12s; gap: 12px; user-select: none; position: sticky; top: 0; background: var(--bg2); z-index: 3; }
.day-hd:hover { background: var(--bg3); }
.day-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; line-height: 1; min-width: 32px; text-align: right; }
.day-info { flex: 1; min-width: 0; }
.day-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-date { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
.day-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; flex-shrink: 0; }
.day-body { padding: 4px 12px 10px; }

.pcard { display: flex; align-items: flex-start; gap: 10px; padding: 8px 8px; border-radius: 8px; cursor: pointer; transition: background 0.12s; margin-bottom: 2px; }
.pcard:hover { background: var(--bg3); }
.pcard.sel { background: rgba(212,68,42,0.12); }
.pcard.sel .pcard-name { color: var(--red2); }
.pcard-ico { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.pcard-body { flex: 1; min-width: 0; }
.pcard-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.35; }
.pcard-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
.tag-free { background: rgba(42,157,122,0.2); color: var(--teal2); }
.tag-paid { background: rgba(201,168,76,0.2); color: var(--gold2); }
.tag-person { background: rgba(232,160,176,0.15); color: var(--sakura); }
.pcard-acts { display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; margin-top: 2px; flex-shrink: 0; }
.pcard:hover .pcard-acts { opacity: 1; }
.act-btn { width: 22px; height: 22px; border: none; background: transparent; border-radius: 4px; cursor: pointer; color: var(--text3); font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.act-btn:hover { background: var(--bg); color: var(--text); }
.act-btn.del:hover { background: rgba(212,68,42,0.2); color: var(--red2); }
.empty-msg { font-size: 12px; color: var(--text3); font-style: italic; padding: 4px 8px 6px; }

.qbar { flex-shrink: 0; padding: 14px 16px; border-top: 1px solid var(--border); background: var(--bg); }
.qlabel { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 9px; }
.qrow { display: flex; gap: 6px; margin-bottom: 6px; }
.qinput { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; font-family: 'Karla', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; }
.qinput::placeholder { color: var(--text3); }
.qinput:focus { border-color: var(--gold); }
.qsel { background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 8px; font-family: 'Karla', sans-serif; font-size: 12px; color: var(--text); outline: none; cursor: pointer; min-width: 0; }
.qsel:focus { border-color: var(--gold); }
.qadd { background: var(--red); border: none; border-radius: 6px; padding: 7px 14px; font-family: 'Karla', sans-serif; font-size: 13px; font-weight: 500; color: white; cursor: pointer; transition: background 0.15s; white-space: nowrap; flex-shrink: 0; }
.qadd:hover { background: var(--red2); }

.map-wrap { flex: 1; position: relative; overflow: hidden; }
#map { width: 100%; height: 100%; }

.ov { position: absolute; z-index: 500; pointer-events: none; }
.ov * { pointer-events: all; }

.fp { top: 16px; left: 16px; background: rgba(14,13,11,0.9); backdrop-filter: blur(16px); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; }
.fp-t { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 8px; }
.fp-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.fpill { font-family: 'Karla', sans-serif; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 14px; border: 1px solid var(--border2); color: var(--text2); background: transparent; cursor: pointer; transition: all 0.14s; }
.fpill:hover { color: var(--text); border-color: var(--text3); }
.fpill.on { background: var(--gold); color: #0e0d0b; border-color: var(--gold); }
.fpill.on-t { background: var(--teal); color: white; border-color: var(--teal); }
.fpill.on-r { background: var(--red); color: white; border-color: var(--red); }

.leg { bottom: 24px; left: 16px; background: rgba(14,13,11,0.9); backdrop-filter: blur(16px); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 14px; }
.leg-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text2); padding: 2px 0; }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.dc { bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(14,13,11,0.97); backdrop-filter: blur(24px); border: 1px solid var(--border2); border-radius: 14px; padding: 20px 22px; width: 340px; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.6); animation: suUp .22s cubic-bezier(.34,1.56,.64,1); }
@keyframes suUp { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.dc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 10px; }
.dc-name { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; line-height: 1.25; color: var(--text); }
.dc-x { background: var(--bg3); border: 1px solid var(--border2); border-radius: 50%; width: 26px; height: 26px; cursor: pointer; color: var(--text3); font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .12s; }
.dc-x:hover { background: var(--bg); color: var(--text); }
.dc-where { font-size: 11px; color: var(--text3); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .08em; }
.dc-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.dc-note { font-size: 12px; font-weight: 300; font-style: italic; color: var(--text2); line-height: 1.6; border-left: 2px solid var(--border2); padding-left: 12px; }

.cl-wrap { padding: 16px 20px; }
.cl-sec { margin-bottom: 22px; }
.cl-t { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
.cl-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 4px; border-radius: 7px; cursor: pointer; transition: background .12s; }
.cl-item:hover { background: var(--bg3); }
.cl-box { width: 16px; height: 16px; border: 1.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all .15s; }
.cl-item.done .cl-box { background: var(--teal); border-color: var(--teal); color: white; }
.cl-item.done .cl-name { text-decoration: line-through; color: var(--text3); }
.cl-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
.cl-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.bud-wrap { padding: 16px 20px; }
.brow { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.brow:last-child { border-bottom: none; }
.brow-l { flex: 1; min-width: 0; }
.brow-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brow-day { font-size: 11px; color: var(--text3); margin-top: 2px; }
.brow-fee { font-size: 13px; font-weight: 500; color: var(--gold2); flex-shrink: 0; }

.mbg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); z-index: 2000; display: none; align-items: center; justify-content: center; }
.mbg.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 28px 32px; width: 460px; max-width: 90vw; animation: mIn .22s cubic-bezier(.34,1.4,.64,1); }
@keyframes mIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.m-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; font-style: italic; margin-bottom: 20px; color: var(--text); }
.mrow { margin-bottom: 14px; }
.mlabel { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--text3); margin-bottom: 6px; }
.minput { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; font-family: 'Karla', sans-serif; font-size: 13px; color: var(--text); outline: none; transition: border-color .15s; width: 100%; }
.minput::placeholder { color: var(--text3); }
.minput:focus { border-color: var(--gold); }
.msel { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; font-family: 'Karla', sans-serif; font-size: 13px; color: var(--text); outline: none; cursor: pointer; width: 100%; }
.mgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mfoot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }

.leaflet-container { background: #1a1814 !important; }
.leaflet-tile { filter: brightness(0.72) saturate(0.55) !important; }
.leaflet-control-zoom a { background: var(--bg2) !important; color: var(--text2) !important; border-color: var(--border2) !important; }
.leaflet-control-zoom a:hover { background: var(--bg3) !important; color: var(--text) !important; }
.leaflet-control-attribution { display: none !important; }

.cm { display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 3px 12px rgba(0,0,0,.5); cursor: pointer; transition: transform .15s, box-shadow .15s; }
.cm:hover { transform: scale(1.25) !important; box-shadow: 0 6px 20px rgba(0,0,0,.6); }
.cm.active { border-color: white; box-shadow: 0 0 0 3px rgba(255,255,255,.25), 0 6px 20px rgba(0,0,0,.5); }
</style>
</head>
<body>

<header class="header">
  <div class="htitle">Japan <span>2026</span></div>
  <div class="hdates">Apr 29 – May 8 · Nida &amp; Sehar</div>
  <div class="hspace"></div>
  <div class="hstats" id="hstats"></div>
  <div class="hdiv"></div>
  <button class="btn btn-outline" onclick="openModal()">+ Add place</button>
</header>

<div class="layout">
  <div class="panel">
    <div class="ptabs">
      <button class="ptab on" onclick="sPTab('days',this)">Itinerary</button>
      <button class="ptab" onclick="sPTab('check',this)">Checklist</button>
      <button class="ptab" onclick="sPTab('budget',this)">Budget</button>
    </div>
    <div class="pscroll" id="pscroll"></div>
    <div class="qbar" id="qbar">
      <div class="qlabel">Quick add</div>
      <div class="qrow">
        <input class="qinput" id="qname" placeholder="Place name…" onkeydown="if(event.key==='Enter')quickAdd()">
        <select class="qsel" id="qday" style="width:90px;"></select>
      </div>
      <div class="qrow">
        <select class="qsel" id="qtype" style="flex:1;">
          <option value="sight">🏯 Sight</option>
          <option value="food">🍜 Food</option>
          <option value="shop">🛍 Shop</option>
          <option value="hotel">🏨 Hotel</option>
          <option value="transport">🚄 Transport</option>
          <option value="cafe">☕ Café</option>
        </select>
        <select class="qsel" id="qperson" style="flex:1;">
          <option value="both">Both</option>
          <option value="Nida">Nida</option>
          <option value="Sehar">Sehar</option>
        </select>
        <button class="qadd" onclick="quickAdd()">Add</button>
      </div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>

    <div class="ov fp">
      <div class="fp-t">Filter</div>
      <div class="fp-pills">
        <button class="fpill on"  onclick="setF('all',this,'on')">All</button>
        <button class="fpill"     onclick="setF('tokyo',this,'on-t')">Tokyo</button>
        <button class="fpill"     onclick="setF('kyoto',this,'on-t')">Kyoto</button>
        <button class="fpill"     onclick="setF('osaka',this,'on-r')">Osaka · Nara</button>
        <button class="fpill"     onclick="setF('sight',this,'on')">Sights</button>
        <button class="fpill"     onclick="setF('food',this,'on')">Food</button>
        <button class="fpill"     onclick="setF('shop',this,'on')">Shops</button>
      </div>
    </div>

    <div class="ov leg">
      <div class="leg-item"><div class="leg-dot" style="background:#4a9edd"></div>Tokyo</div>
      <div class="leg-item"><div class="leg-dot" style="background:#2a9d7a"></div>Kyoto</div>
      <div class="leg-item"><div class="leg-dot" style="background:#d4442a"></div>Osaka · Nara</div>
      <div class="leg-item"><div class="leg-dot" style="background:#c9a84c"></div>Travel</div>
    </div>

    <div class="ov dc" id="dc">
      <div class="dc-top">
        <div class="dc-name" id="dcN"></div>
        <button class="dc-x" onclick="closeDC()">✕</button>
      </div>
      <div class="dc-where" id="dcW"></div>
      <div class="dc-tags" id="dcT"></div>
      <div class="dc-note" id="dcNote"></div>
    </div>
  </div>
</div>

<div class="mbg" id="mbg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-title">Add a place</div>
    <div class="mrow">
      <div class="mlabel">Name</div>
      <input class="minput" id="mname" placeholder="e.g. Philosopher's Path">
    </div>
    <div class="mgrid">
      <div class="mrow"><div class="mlabel">Day</div><select class="msel" id="mday"></select></div>
      <div class="mrow"><div class="mlabel">Type</div>
        <select class="msel" id="mtype">
          <option value="sight">🏯 Sight</option>
          <option value="food">🍜 Food</option>
          <option value="shop">🛍 Shop</option>
          <option value="hotel">🏨 Hotel</option>
          <option value="transport">🚄 Transport</option>
          <option value="cafe">☕ Café</option>
        </select>
      </div>
      <div class="mrow"><div class="mlabel">Entry fee</div><input class="minput" id="mfee" placeholder="Free / ¥500"></div>
      <div class="mrow"><div class="mlabel">For</div>
        <select class="msel" id="mperson">
          <option value="both">Both</option>
          <option value="Nida">Nida</option>
          <option value="Sehar">Sehar</option>
        </select>
      </div>
    </div>
    <div class="mrow"><div class="mlabel">Notes</div><input class="minput" id="mnote" placeholder="Tips, reminders, links…"></div>
    <div class="mfoot">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" onclick="modalAdd()">Add to itinerary</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const DAYS=[
  {id:'apr29',label:'Apr 29',dow:'Mon',name:'Arrival',city:'flight'},
  {id:'apr30',label:'Apr 30',dow:'Tue',name:'Asakusa + Shibuya',city:'tokyo'},
  {id:'may1', label:'May 1', dow:'Wed',name:'Kamakura day trip',city:'tokyo'},
  {id:'may2', label:'May 2', dow:'Thu',name:'Shinjuku + Setagaya',city:'tokyo'},
  {id:'may3', label:'May 3', dow:'Fri',name:'Akihabara + Hachioji',city:'tokyo'},
  {id:'may4', label:'May 4', dow:'Sat',name:'Travel to Kyoto',city:'travel'},
  {id:'may5', label:'May 5', dow:'Sun',name:'Fushimi + Kinkaku-ji',city:'kyoto'},
  {id:'may6', label:'May 6', dow:'Mon',name:'Arashiyama + Tea ceremony',city:'kyoto'},
  {id:'may7', label:'May 7', dow:'Tue',name:'Osaka + Nara day trip',city:'osaka'},
  {id:'may8', label:'May 8', dow:'Wed',name:'Departure day',city:'flight'},
];
const CC={tokyo:'#4a9edd',kyoto:'#2a9d7a',osaka:'#d4442a',nara:'#d4442a',travel:'#c9a84c',flight:'#c9a84c'};
const TC={sight:'rgba(74,158,221,.15)',food:'rgba(230,81,0,.15)',shop:'rgba(106,27,154,.15)',hotel:'rgba(42,157,122,.15)',transport:'rgba(201,168,76,.15)',cafe:'rgba(232,160,176,.15)'};
const TI={sight:'🏯',food:'🍜',shop:'🛍',hotel:'🏨',transport:'🚄',cafe:'☕'};

const SEED=[
  {id:1,day:'apr29',name:'Hotel Villa Fontaine Nihonbashi',type:'hotel',city:'tokyo',lat:35.6843,lng:139.7779,fee:'',person:'both',note:'Check-in Apr 29. Checkout May 4 by 11am. 5 min from Tokyo Station.'},
  {id:2,day:'apr30',name:'Senso-ji Temple',type:'sight',city:'tokyo',lat:35.7148,lng:139.7967,fee:'Free',person:'both',note:'Arrive before 9am during Golden Week. Nakamise shopping street at entrance.'},
  {id:3,day:'apr30',name:'Kameido Tenjin Shrine',type:'sight',city:'tokyo',lat:35.6991,lng:139.8238,fee:'Free',person:'Sehar',note:'Famous wisteria festival site with beautiful arched bridges.'},
  {id:4,day:'apr30',name:'Shibuya Crossing',type:'sight',city:'tokyo',lat:35.6595,lng:139.7005,fee:'Free',person:'both',note:'Most famous crossing in the world. View from above at Starbucks or Mag\'s Park.'},
  {id:5,day:'apr30',name:'Takeshita Street',type:'shop',city:'tokyo',lat:35.6703,lng:139.7027,fee:'Free',person:'both',note:'Harajuku street fashion — crepes, wild outfits, pop culture.'},
  {id:6,day:'apr30',name:'Shibuya Sky',type:'sight',city:'tokyo',lat:35.6581,lng:139.7017,fee:'¥2,000',person:'both',note:'Rooftop of Scramble Square. Go at sunset. BOOK IN ADVANCE!'},
  {id:7,day:'may1',name:'Hokokuji Bamboo Forest',type:'sight',city:'tokyo',lat:35.3296,lng:139.5521,fee:'¥400',person:'Nida',note:'Kamakura — serene bamboo grove with tea house inside. ~1hr from Tokyo on Yokosuka Line.'},
  {id:8,day:'may1',name:'Kamakura Great Buddha',type:'sight',city:'tokyo',lat:35.3167,lng:139.5352,fee:'¥300',person:'both',note:'13.35m bronze Buddha — you can enter the hollow interior for ¥20 extra.'},
  {id:9,day:'may1',name:'Hatoya Shibuya',type:'food',city:'tokyo',lat:35.6620,lng:139.6987,fee:'',person:'Nida',note:'Kamiyamacho, Shibuya. Excellent matcha.'},
  {id:10,day:'may2',name:'Gōtokuji Temple',type:'sight',city:'tokyo',lat:35.6536,lng:139.6509,fee:'Free',person:'Nida',note:'The original lucky cat temple — hundreds of ceramic maneki-neko.'},
  {id:11,day:'may2',name:'Suga Shrine Stairs',type:'sight',city:'tokyo',lat:35.6901,lng:139.7199,fee:'Free',person:'Sehar',note:'The "Your Name" anime staircase in Shinjuku. Very photogenic.'},
  {id:12,day:'may2',name:'Art Aquarium Museum',type:'sight',city:'tokyo',lat:35.6701,lng:139.7660,fee:'¥2,800',person:'both',note:'Ginza — goldfish in illuminated installations. Very atmospheric.'},
  {id:13,day:'may2',name:'Shibuya 109',type:'shop',city:'tokyo',lat:35.6598,lng:139.6983,fee:'',person:'Sehar',note:'Iconic 8-floor fashion mall. Japanese street fashion and beauty brands.'},
  {id:14,day:'may3',name:'Churito Pagoda',type:'sight',city:'tokyo',lat:35.6329,lng:139.2003,fee:'Free',person:'both',note:'Arakuyama Sengen Park — Mt Fuji views on clear days.'},
  {id:15,day:'may3',name:'Capybara Café',type:'cafe',city:'tokyo',lat:35.7021,lng:139.7154,fee:'varies',person:'both',note:'Book slots well in advance — fills up fast during Golden Week!'},
  {id:16,day:'may3',name:'Hakiboro Toys + Radio Kaikan',type:'shop',city:'tokyo',lat:35.7022,lng:139.7742,fee:'',person:'both',note:'Akihabara — anime, figures, retro games, electronics. 10 floors of nerd heaven.'},
  {id:17,day:'may4',name:'HIKARI 643 — Tokyo → Kyoto',type:'transport',city:'travel',lat:35.6812,lng:139.7671,fee:'',person:'both',note:'Departs 12:33, arrives Kyoto 15:12. Checkout hotel by 11am.'},
  {id:18,day:'may4',name:'Gion / Shirakawa Canal',type:'sight',city:'kyoto',lat:35.0036,lng:135.7765,fee:'Free',person:'Sehar',note:'Arrive evening — charming canal in the geisha district. Kimono rentals from ¥3,000 nearby.'},
  {id:19,day:'may4',name:'Stay Sakura Kyoto Gion',type:'hotel',city:'kyoto',lat:34.9990,lng:135.7735,fee:'',person:'both',note:'Check-in May 4 ~15:30. Checkout May 8 by 11am. ⚠️ Free cancel until Apr 30!'},
  {id:20,day:'may5',name:'Fushimi Inari Taisha',type:'sight',city:'kyoto',lat:34.9671,lng:135.7727,fee:'Free',person:'both',note:'Go at 7am — thousands of vermilion torii gates. Gets very crowded by 9am in Golden Week.'},
  {id:21,day:'may5',name:'Nishiki Market',type:'food',city:'kyoto',lat:35.0050,lng:135.7649,fee:'Free',person:'Nida',note:'Kyoto\'s Kitchen — narrow covered market. Pickles, fresh tofu, skewers, matcha snacks.'},
  {id:22,day:'may5',name:'Kinkaku-ji Golden Pavilion',type:'sight',city:'kyoto',lat:35.0394,lng:135.7292,fee:'¥500',person:'both',note:'Iconic gold-leaf pavilion on a pond. Go after 2pm when Fushimi crowds ease.'},
  {id:23,day:'may5',name:'Kitano Tenmangu Shrine',type:'sight',city:'kyoto',lat:35.0325,lng:135.7352,fee:'¥1,000',person:'Sehar',note:'Plum trees and ornate bridges.'},
  {id:24,day:'may6',name:'Arashiyama Bamboo Grove',type:'sight',city:'kyoto',lat:35.0170,lng:135.6727,fee:'Free',person:'both',note:'Go early morning. Bamboo grove free; Tenryu-ji garden ¥500 extra.'},
  {id:25,day:'may6',name:'Kimono Tea Ceremony',type:'sight',city:'kyoto',lat:35.0067,lng:135.7686,fee:'~$30/pp',person:'both',note:'mai-ko.com — Nakagyo-ku. Dress in kimono + traditional tea ceremony. Book in advance!'},
  {id:26,day:'may6',name:'Miffy Café',type:'cafe',city:'kyoto',lat:35.0117,lng:135.7683,fee:'varies',person:'both',note:'Book ahead — very popular!'},
  {id:27,day:'may7',name:'Nara Deer Park',type:'sight',city:'nara',lat:34.6851,lng:135.8431,fee:'Free',person:'Nida',note:'~45 min from Kyoto by Kintetsu. Hundreds of free-roaming deer. Buy shika senbei to feed them.'},
  {id:28,day:'may7',name:'Umeda Sky Building',type:'sight',city:'osaka',lat:34.7056,lng:135.4900,fee:'¥2,000',person:'both',note:'Osaka — two towers with floating garden observatory. ~15 min from Kyoto.'},
  {id:29,day:'may7',name:'Dotonbori',type:'food',city:'osaka',lat:34.6687,lng:135.5013,fee:'Free',person:'both',note:'Osaka street food — takoyaki, ramen, okonomiyaki. Giant Glico running man sign is here.'},
  {id:30,day:'may8',name:'NOZOMI — Kyoto → NRT',type:'transport',city:'travel',lat:34.9857,lng:135.7580,fee:'',person:'both',note:'Depart Kyoto ~9:00 → Tokyo ~11:15 → Narita Express → NRT ~13:05. Nida: ZG022 15:55 · Sehar: WS081 18:30.'},
];

let places=JSON.parse(localStorage.getItem('jp26')||'null')||SEED.map(p=>({...p}));
let nid=Math.max(...places.map(p=>p.id),30)+1;
let filt='all', ptab='days', selId=null, mmap, markers={}, coll={};

const save=()=>localStorage.setItem('jp26',JSON.stringify(places));

// MAP
function initMap(){
  mmap=L.map('map',{zoomControl:false}).setView([35.4,136.5],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(mmap);
  L.control.zoom({position:'bottomright'}).addTo(mmap);
  mmap.on('click',()=>{selId=null;closeDC();render();renderMk();});
}

function mkIcon(p){
  const c=CC[p.city]||'#888', i=TI[p.type]||'📍', sz=selId===p.id?40:32;
  const active=selId===p.id?' active':'';
  return L.divIcon({
    className:'',
    html:`<div class="cm${active}" style="width:${sz}px;height:${sz}px;background:${c}22;border-color:${c};font-size:${sz*.44}px;">${i}</div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
  });
}

function renderMk(){
  Object.values(markers).forEach(m=>mmap.removeLayer(m));
  markers={};
  getFilt().forEach(p=>{
    if(!p.lat)return;
    const m=L.marker([p.lat,p.lng],{icon:mkIcon(p)});
    m.on('click',e=>{L.DomEvent.stopPropagation(e);clickP(p.id);});
    m.addTo(mmap);
    markers[p.id]=m;
  });
}

function getFilt(){
  if(filt==='all')return places;
  if(['tokyo','kyoto'].includes(filt))return places.filter(p=>p.city===filt);
  if(filt==='osaka')return places.filter(p=>p.city==='osaka'||p.city==='nara');
  return places.filter(p=>p.type===filt);
}

function setF(f,el,cls){
  filt=f;
  document.querySelectorAll('.fpill').forEach(p=>p.className='fpill');
  el.classList.add(cls);
  renderMk();render();
}

// DETAIL CARD
function showDC(p){
  document.getElementById('dcN').textContent=p.name;
  const day=DAYS.find(d=>d.id===p.day);
  document.getElementById('dcW').textContent=[day?.label,p.city?.charAt(0).toUpperCase()+p.city?.slice(1)].filter(Boolean).join(' · ');
  const t=document.getElementById('dcT');
  t.innerHTML='';
  if(p.fee)t.innerHTML+=`<span class="tag ${p.fee==='Free'?'tag-free':'tag-paid'}">${p.fee}</span>`;
  if(p.type)t.innerHTML+=`<span class="tag" style="background:${TC[p.type]||'rgba(255,255,255,.08)'};color:var(--text2);">${TI[p.type]||''} ${p.type}</span>`;
  if(p.person&&p.person!=='both')t.innerHTML+=`<span class="tag tag-person">${p.person}</span>`;
  const n=document.getElementById('dcNote');
  if(p.note){n.textContent=p.note;n.style.display='block';}else{n.style.display='none';}
  document.getElementById('dc').style.display='block';
}
function closeDC(){document.getElementById('dc').style.display='none';}

// PANEL
function sPTab(tab,el){
  ptab=tab;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('qbar').style.display=tab==='days'?'block':'none';
  render();
}

function render(){
  // stats
  const fc=places.filter(p=>p.fee==='Free').length, pc=places.filter(p=>p.fee&&p.fee!=='Free'&&p.fee!=='').length;
  document.getElementById('hstats').innerHTML=`
    <div class="hstat"><div class="hstat-n">${places.length}</div><div class="hstat-l">places</div></div>
    <div class="hdiv"></div>
    <div class="hstat"><div class="hstat-n">${fc}</div><div class="hstat-l">free</div></div>
    <div class="hdiv"></div>
    <div class="hstat"><div class="hstat-n">${pc}</div><div class="hstat-l">paid</div></div>`;
  const sc=document.getElementById('pscroll');
  if(ptab==='days')sc.innerHTML=renderDays();
  else if(ptab==='check')sc.innerHTML=renderCL();
  else sc.innerHTML=renderBud();
}

function renderDays(){
  return DAYS.map(day=>{
    const dp=getFilt().filter(p=>p.day===day.id);
    const c=CC[day.city]||'#888';
    const items=dp.length?dp.map(p=>`
      <div class="pcard${selId===p.id?' sel':''}" id="pc-${p.id}" onclick="clickP(${p.id})">
        <div class="pcard-ico" style="background:${TC[p.type]||'rgba(255,255,255,.06)'};">${TI[p.type]||'📍'}</div>
        <div class="pcard-body">
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-meta">
            ${p.fee?`<span class="tag ${p.fee==='Free'?'tag-free':'tag-paid'}">${p.fee}</span>`:''}
            ${p.person&&p.person!=='both'?`<span class="tag tag-person">${p.person}</span>`:''}
          </div>
        </div>
        <div class="pcard-acts">
          <button class="act-btn" onclick="focP(event,${p.id})">🎯</button>
          <button class="act-btn del" onclick="delP(event,${p.id})">✕</button>
        </div>
      </div>`).join(''):
      `<div class="empty-msg">No places yet</div>`;
    return `<div class="day-block">
      <div class="day-hd" onclick="togColl('${day.id}')">
        <div class="day-num" style="color:${c};">${day.label.split(' ')[1]}</div>
        <div class="day-info"><div class="day-name">${day.name}</div><div class="day-date">${day.label} · ${day.dow}</div></div>
        <div class="day-pill" style="background:${c}22;color:${c};">${dp.length}</div>
      </div>
      ${!coll[day.id]?`<div class="day-body">${items}</div>`:''}
    </div>`;
  }).join('');
}

function renderCL(){
  const urgent=[
    {k:'u0',name:'Shibuya Sky tickets',sub:'Sells out weeks ahead'},
    {k:'u1',name:'Capybara Café booking',sub:'Time slots limited'},
    {k:'u2',name:'Kimono Tea Ceremony',sub:'mai-ko.com — book now'},
    {k:'u3',name:'Miffy Café Kyoto',sub:'Reservation required'},
    {k:'u4',name:'HIKARI 643 reserved seats',sub:'May 4 — Golden Week!'},
    {k:'u5',name:'NOZOMI reserved seats',sub:'May 8 departure'},
    {k:'u6',name:'Confirm Kyoto hotel',sub:'⚠️ Free cancel until Apr 30'},
  ];
  const pack=['Suica / Pasmo IC card','Yen cash (¥100k–150k)','Power adapter (Type A)','Portable charger','Google Maps offline (Tokyo + Kyoto)','Google Translate offline Japanese','Coin purse (vending machines everywhere)'];
  const mi=(arr)=>arr.map((item,i)=>{
    const k=item.k||`p${i}`;
    const done=localStorage.getItem(k)==='1';
    return `<div class="cl-item${done?' done':''}" onclick="togCL('${k}',this)">
      <div class="cl-box">${done?'✓':''}</div>
      <div><div class="cl-name">${item.name||item}</div>${item.sub?`<div class="cl-sub">${item.sub}</div>`:''}</div>
    </div>`;
  }).join('');
  return `<div class="cl-wrap">
    <div class="cl-sec"><div class="cl-t">Book ahead ASAP</div>${mi(urgent)}</div>
    <div class="cl-sec"><div class="cl-t">Packing list</div>${mi(pack.map((n,i)=>({k:`p${i}`,name:n})))}</div>
  </div>`;
}

function renderBud(){
  const paid=places.filter(p=>p.fee&&p.fee!=='Free'&&p.fee!=='');
  return `<div class="bud-wrap">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);">Paid attractions</div>
    ${paid.map(p=>{const day=DAYS.find(d=>d.id===p.day);return`<div class="brow"><div class="brow-l"><div class="brow-name">${p.name}</div><div class="brow-day">${day?.label||''} · ${p.city}</div></div><div class="brow-fee">${p.fee}</div></div>`;}).join('')||'<div style="font-size:13px;color:var(--text3);font-style:italic;padding:8px 0;">No paid places yet</div>'}
    <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);line-height:1.7;">💴 Exchange ¥100k–150k before departure or at 7-Eleven / Japan Post ATMs at Narita for the best rates.</div>
  </div>`;
}

// INTERACTIONS
function clickP(id){
  const p=places.find(x=>x.id===id); if(!p)return;
  selId=id; render(); renderMk(); showDC(p);
  if(p.lat) mmap.setView([p.lat,p.lng],Math.max(mmap.getZoom(),14),{animate:true,duration:.8});
  setTimeout(()=>{const el=document.getElementById(`pc-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}
function focP(e,id){e.stopPropagation();clickP(id);}
function delP(e,id){
  e.stopPropagation();
  if(!confirm('Remove this place?'))return;
  places=places.filter(p=>p.id!==id);save();
  if(selId===id){selId=null;closeDC();}
  renderMk();render();
}
function togColl(dayId){coll[dayId]=!coll[dayId];render();}
function togCL(k,el){
  const was=localStorage.getItem(k)==='1';
  localStorage.setItem(k,was?'0':'1');
  el.classList.toggle('done',!was);
  el.querySelector('.cl-box').textContent=was?'':'✓';
}

function quickAdd(){
  const name=document.getElementById('qname').value.trim();if(!name)return;
  const dayId=document.getElementById('qday').value;
  const type=document.getElementById('qtype').value;
  const person=document.getElementById('qperson').value;
  const day=DAYS.find(d=>d.id===dayId);
  const city=day?.city==='tokyo'?'tokyo':day?.city==='kyoto'?'kyoto':day?.city||'tokyo';
  places.push({id:nid++,day:dayId,name,type,city,lat:null,lng:null,fee:'',person,note:''});
  save();document.getElementById('qname').value='';renderMk();render();
}

function openModal(){document.getElementById('mbg').classList.add('show');document.getElementById('mname').focus();}
function closeModal(){document.getElementById('mbg').classList.remove('show');}
function modalAdd(){
  const name=document.getElementById('mname').value.trim();if(!name){document.getElementById('mname').focus();return;}
  const dayId=document.getElementById('mday').value;
  const type=document.getElementById('mtype').value;
  const fee=document.getElementById('mfee').value.trim();
  const person=document.getElementById('mperson').value;
  const note=document.getElementById('mnote').value.trim();
  const day=DAYS.find(d=>d.id===dayId);
  const city=day?.city==='tokyo'?'tokyo':day?.city==='kyoto'?'kyoto':day?.city||'tokyo';
  places.push({id:nid++,day:dayId,name,type,city,lat:null,lng:null,fee,person,note});
  save();closeModal();
  ['mname','mfee','mnote'].forEach(id=>document.getElementById(id).value='');
  renderMk();render();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeDC();closeModal();selId=null;render();renderMk();}
});

// INIT
[document.getElementById('qday'),document.getElementById('mday')].forEach(sel=>{
  DAYS.forEach(d=>{
    const o=document.createElement('option');
    o.value=d.id;o.textContent=`${d.label} — ${d.name}`;
    sel.appendChild(o);
  });
});

initMap();renderMk();render();
setTimeout(()=>{
  const pts=places.filter(p=>p.lat).map(p=>[p.lat,p.lng]);
  if(pts.length)mmap.fitBounds(pts,{padding:[40,40]});
},300);
</script>
